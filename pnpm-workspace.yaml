---
packages:
  - packages/fp
  - packages/pure
  - packages/hono-drizzle
strictDepBuilds: true
minimumReleaseAge: 1440
# 推移的依存のgit/tarball URLを禁止
blockExoticSubdeps: true

# 信頼レベルの低下を検知
trustPolicy: no-downgrade
allowBuilds:
  esbuild: true
  unrs-resolver: true
minimumReleaseAgeExclude:
  # Renovate security update: vitest@3.2.6
  - vitest@3.2.6
  # Renovate security update: hono@4.12.25
  - hono@4.12.25
